<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>ระบบแนะนำการสั่งซื้อสินค้า - Mockup</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.8.2/di  :root{
    --bg: #F4F6F5;
    --card-bg: #FFFFFF;
    --ink: #14181A;
    --ink-soft: #5B6560;
    --green: #1F7A4D;
    --green-deep: #14532E;
    --green-soft: #E7F3EB;
    --line: #E1E6E2;
    --line-soft: #F0F3F1;
    --danger: #B3382C;
    --danger-soft: #FBEAE7;
    --radius: 10px;
  }
  body.dark{
    --bg: #121415;
    --card-bg: #1A1E1C;
    --ink: #ECF0EE;
    --ink-soft: #8C9992;
    --green: #2CB371;
    --green-deep: #163625;
    --green-soft: #12281D;
    --line: #2F3934;
    --line-soft: #202724;
    --danger-soft: #2D1A18;
  }
  *{ box-sizing: border-box; }
  body, .stat-card, .panel, .sidebar, main, .topbar, .btn, .search, .input-box, select, .modal-box {
    transition: background-color 0.25s ease, border-color 0.25s ease, color 0.25s ease;
  }
  body{
    margin:0;
    font-family: "Noto Sans Thai","Inter",sans-serif;
    background: var(--bg);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }
  select, select option {
    background: var(--card-bg);
    color: var(--ink);
    border: 1px solid var(--line);
    outline: none;
  }
  .app{ display:flex; min-height:100vh; }

  /* Sidebar */
  .sidebar{
    width: 220px;
    flex-shrink:0;
    background: var(--green-deep);
    color:#fff;
    display:flex;
    flex-direction:column;
    padding: 22px 14px;
  }
  .brand{
    display:flex; align-items:center; gap:10px;
    padding: 0 8px 22px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.14);
    margin-bottom: 18px;
  }
  .brand-mark{
    width:30px; height:30px; border-radius:8px;
    background: var(--green);
    display:flex; align-items:center; justify-content:center;
    font-weight:700; font-size:14px;
  }
  .brand-name{ font-weight:600; font-size:14.5px; line-height:1.3; }
  .brand-sub{ font-size:11px; color: rgba(255,255,255,0.6); }

  nav{ display:flex; flex-direction:column; gap:2px; }
  .nav-item{
    display:flex; align-items:center; gap:10px;
    padding:10px 12px;
    border-radius:8px;
    font-size:13.5px;
    color: rgba(255,255,255,0.78);
    cursor:pointer;
    border:none; background:none;
    text-align:left; width:100%;
    font-family:inherit;
  }
  .nav-item svg{ width:17px; height:17px; flex-shrink:0; }
  .nav-item:hover{ background: rgba(255,255,255,0.08); color:#fff; }
  .nav-item.active{ background: var(--green); color:#fff; font-weight:600; }

  .sidebar-foot{
    margin-top:auto;
    padding-top:16px;
    border-top:1px solid rgba(255,255,255,0.14);
    font-size:11.5px;
    color: rgba(255,255,255,0.55);
  }

  /* Main */
  main{ flex:1; min-width:0; }
  .topbar{
    height:60px;
    border-bottom:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
    padding: 0 26px;
  }
  .topbar h1{ font-size:16px; font-weight:600; margin:0; }
  .topbar .meta{ font-size:12px; color:var(--ink-soft); }
  .user-chip{
    display:flex; align-items:center; gap:8px;
    font-size:13px;
  }
  .avatar{
    width:30px;height:30px;border-radius:50%;
    background: var(--green-soft); color:var(--green-deep);
    display:flex;align-items:center;justify-content:center;
    font-weight:700; font-size:12px;
  }
  .icon-btn{
    width:32px; height:32px; border-radius:8px; border:1px solid var(--line);
    background: var(--card-bg); color:var(--ink-soft); display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0;
  }
  .icon-btn:hover{ background:var(--danger-soft); border-color:var(--danger); color:var(--danger); }
  .icon-btn svg{ width:16px; height:16px; }

  .page{ padding: 24px 26px 40px; }
  .page-head{ margin-bottom:18px; }
  .page-head h2{ font-size:19px; margin:0 0 4px; }
  .page-head p{ margin:0; font-size:13px; color:var(--ink-soft); }

  /* Cards */
  .grid-4{ display:grid; grid-template-columns: repeat(4,1fr); gap:14px; margin-bottom:20px; }
  .stat-card{
    border:1px solid var(--line); border-radius: var(--radius);
    padding:16px; background: var(--card-bg);
  }
  .stat-card .label{ font-size:12px; color:var(--ink-soft); margin-bottom:8px; }
  .stat-card .value{ font-size:24px; font-weight:700; }
  .stat-card .delta{ font-size:12px; margin-top:6px; font-weight:600; }
  .delta.up{ color: var(--green); }
  .delta.warn{ color: var(--danger); }

  .row-2{ display:grid; grid-template-columns: 1.4fr 1fr; gap:14px; margin-bottom:20px; }
  .panel{
    border:1px solid var(--line); border-radius: var(--radius);
    background: var(--card-bg); overflow:hidden;
  }
  .panel-head{
    padding:14px 16px; border-bottom:1px solid var(--line-soft);
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h3{ font-size:14px; margin:0; font-weight:600; }
  .panel-body{ padding:16px; }
  .link-btn{ font-size:12px; color:var(--green); font-weight:600; cursor:pointer; background:none;border:none;font-family:inherit; }

  /* bar chart (css) */
  .bars{ display:flex; align-items:flex-end; gap:10px; height:150px; padding-top:10px; }
  .bar-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:6px; }
  .bar{ width:100%; max-width:26px; background: var(--green-soft); border-radius:4px 4px 0 0; position:relative; }
  .bar.active{ background: var(--green); }
  .bar-label{ font-size:10.5px; color:var(--ink-soft); }

  table{ width:100%; border-collapse:collapse; font-size:13px; }
  th{ text-align:left; font-size:11.5px; text-transform:none; color:var(--ink-soft); font-weight:600; padding:8px 10px; border-bottom:1px solid var(--line); }
  td{ padding:10px 10px; border-bottom:1px solid var(--line-soft); }
  tr:last-child td{ border-bottom:none; }

  .tag{
    display:inline-flex; align-items:center; gap:5px;
    font-size:11px; font-weight:600; padding:3px 9px; border-radius:100px;
  }
  .tag.ok{ background: var(--green-soft); color: var(--green-deep); }
  .tag.low{ background: var(--danger-soft); color: var(--danger); }
  .tag.dot::before{ content:""; width:6px;height:6px;border-radius:50%;background:currentColor; }

  .btn{
    font-family:inherit; font-size:13px; font-weight:600;
    padding:9px 16px; border-radius:8px; border:1px solid var(--line);
    background: var(--card-bg); color:var(--ink); cursor:pointer;
  }
  .btn.primary{ background:var(--green); border-color:var(--green); color:#fff; }
  .btn.primary:hover{ background: var(--green-deep); }
  .btn.ghost{ border-color:transparent; color:var(--ink-soft); }

  .toolbar{ display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; gap:10px; flex-wrap:wrap; }
  .search{
    display:flex; align-items:center; gap:8px;
    border:1px solid var(--line); border-radius:8px; padding:8px 12px;
    font-size:13px; color:var(--ink-soft); flex:1; max-width:320px;
  }
  .search input{ border:none; outline:none; font-family:inherit; font-size:13px; flex:1; background:transparent; color:var(--ink); }

  .badge-count{
    font-size:11px; background:var(--danger); color:#fff;
    border-radius:100px; padding:1px 7px; margin-left:auto;
  }

  .rec-row{ display:flex; align-items:center; justify-content:space-between; padding:12px 0; border-bottom:1px solid var(--line-soft); gap:12px; }
  .rec-row:last-child{ border-bottom:none; }
  .rec-name{ font-size:13.5px; font-weight:600; }
  .rec-sub{ font-size:11.5px; color:var(--ink-soft); margin-top:2px; }
  .rec-qty{ text-align:right; }
  .rec-qty .n{ font-size:16px; font-weight:700; color:var(--green-deep); }
  .rec-qty .u{ font-size:11px; color:var(--ink-soft); }

  .tab-content{ display:none; }
  .tab-content.show{ display:block; }

  .pill-row{ display:flex; gap:8px; margin-bottom:16px; }
  .pill{ font-size:12.5px; padding:7px 14px; border-radius:100px; border:1px solid var(--line); cursor:pointer; background: var(--card-bg); color: var(--ink); font-family:inherit; }
  .pill.active{ background:var(--ink); color: var(--card-bg); border-color:var(--ink); }

  /* Modal */
  .modal-overlay{
    position:fixed; inset:0; background:rgba(20,24,26,0.45);
    display:flex; align-items:center; justify-content:center;
    z-index:100; padding:16px;
    transition: opacity 0.2s ease;
  }
  .modal-overlay.hidden{ display:none; }
  .modal-box{
    background: var(--card-bg); border-radius:12px; width:100%; max-width:420px;
    max-height:90vh; overflow-y:auto; color: var(--ink);
    transition: transform 0.2s ease;
    transform: scale(0.95);
  }
  .modal-overlay:not(.hidden) .modal-box{
    transform: scale(1);
  }
  .modal-head{
    display:flex; align-items:center; justify-content:space-between;
    padding:16px 18px; border-bottom:1px solid var(--line);
  }
  .modal-head h3{ margin:0; font-size:15px; }
  .modal-close{
    border:none; background:none; font-size:20px; line-height:1;
    color:var(--ink-soft); cursor:pointer; padding:2px 6px;
  }
  .modal-body{ padding:18px; }
  .modal-foot{
    display:flex; justify-content:flex-end; gap:8px;
    padding:14px 18px; border-top:1px solid var(--line);
  }
  .field{ margin-bottom:14px; }
  .field label{ display:block; font-size:12.5px; font-weight:600; margin-bottom:6px; color:var(--ink); }
  .input-box{
    display:flex; align-items:center; gap:9px;
    border:1px solid var(--line); border-radius:9px; padding:10px 12px;
  }
  .input-box:focus-within{ border-color:var(--green); box-shadow:0 0 0 3px var(--green-soft); }
  .input-box input{ border:none; outline:none; font-family:inherit; font-size:13.5px; width:100%; background:transparent; color: var(--ink); }

  /* Toast */
  .toast{
    position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px);
    background:var(--green-deep); color:#fff; font-size:13px; font-weight:600;
    padding:11px 20px; border-radius:9px; opacity:0; pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease; z-index:200;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  @media (max-width: 860px){
    .grid-4{ grid-template-columns: repeat(2,1fr); }
    .row-2{ grid-template-columns: 1fr; }
    .sidebar{ width:72px; }
    .brand-name,.brand-sub,.nav-item span.label{ display:none; }
    .nav-item{ justify-content:center; }
  }
  @media (max-width: 560px){
    .app{ flex-direction:column; }
    .sidebar{
      width:100%; height:auto; flex-direction:row; align-items:center;
      padding:10px 12px; gap:4px; overflow-x:auto;
    }
    .brand{ display:none; }
    nav{ flex-direction:row; gap:4px; width:100%; }
    .nav-item{ flex-direction:column; gap:3px; padding:8px 6px; font-size:10.5px; flex:1; }
    .nav-item svg{ width:16px; height:16px; }
    .nav-item span.label{ display:block; }
    .sidebar-foot{ display:none; }
    .topbar{ padding:0 14px; }
    .page{ padding:16px 14px 30px; }
    .grid-4{ grid-template-columns: 1fr 1fr; gap:10px; }
    .stat-card .value{ font-size:19px; }
    table{ font-size:12px; }
    .panel-body{ overflow-x:auto; }
    .toolbar{ flex-direction:column; align-items:stretch; }
    .search{ max-width:none; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-mark">ร้</div>
      <div>
        <div class="brand-name">ร้านป้าแดง</div>
        <div class="brand-sub">ระบบแนะนำการสั่งซื้อ</div>
      </div>
    </div>
    <nav>
      <button class="nav-item active" data-tab="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="9" rx="1"/><rect x="14" y="3" width="7" height="5" rx="1"/><rect x="14" y="12" width="7" height="9" rx="1"/><rect x="3" y="16" width="7" height="5" rx="1"/></svg>
        <span class="label">แดชบอร์ด</span>
      </button>
      <button class="nav-item" data-tab="product">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7 12 3 4 7v10l8 4 8-4V7Z"/><path d="M4 7l8 4 8-4M12 11v10"/></svg>
        <span class="label">สินค้า</span>
      </button>
      <button class="nav-item" data-tab="sales">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3h2l2.4 12.2a2 2 0 0 0 2 1.8h7.2a2 2 0 0 0 2-1.6L21 8H6"/><circle cx="9" cy="20" r="1"/><circle cx="17" cy="20" r="1"/></svg>
        <span class="label">บันทึกการขาย</span>
      </button>
      <button class="nav-item" data-tab="reco">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        <span class="label">แนะนำสั่งซื้อ</span>
      </button>
      <button class="nav-item" data-tab="reports">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 15v3M12 10v8M17 6v12"/></svg>
        <span class="label">รายงาน</span>
      </button>
    </nav>
    <div class="sidebar-foot">เวอร์ชันตัวอย่าง (Mockup)<br>ไม่เชื่อมต่อข้อมูลจริง</div>
  </aside>

  <!-- MAIN -->
  <main>
    <div class="topbar">
      <div>
        <h1 id="page-title">แดชบอร์ด</h1>
      </div>
      <div class="user-chip">
        <span class="meta" id="topbarDate">อังคาร 14 ก.ค. 2569</span>
        <button class="icon-btn" id="darkModeBtn" title="สลับโหมดมืด/สว่าง" style="margin-right: 4px;">
          <svg id="darkModeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px; height:16px;">
            <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>
          </svg>
        </button>
        <div class="avatar">จ</div>
        <button class="icon-btn" id="logoutBtn" title="ออกจากระบบ">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><path d="M16 17l5-5-5-5"/><path d="M21 12H9"/></svg>
        </button>
      </div>
    </div>

    <!-- ================= DASHBOARD ================= -->
    <section class="tab-content show" id="tab-dashboard">
      <div class="page">
        <div class="page-head">
          <p>ภาพรวมร้านวันนี้ ยอดขาย สต็อก และสินค้าที่ควรสั่งซื้อ</p>
        </div>

        <div class="grid-4">
          <div class="stat-card">
            <div class="label">ยอดขายวันนี้</div>
            <div class="value" id="dashTotalSales">2,480 ฿</div>
            <div class="delta up">▲ 12% จากเมื่อวาน</div>
          </div>
          <div class="stat-card">
            <div class="label">จำนวนสินค้าทั้งหมด</div>
            <div class="value" id="dashTotalItems">-- รายการ</div>
            <div class="delta">คงที่</div>
          </div>
          <div class="stat-card">
            <div class="label">สินค้าใกล้หมด</div>
            <div class="value" id="dashLowStockItems">-- รายการ</div>
            <div class="delta warn">ควรสั่งซื้อเร็ว ๆ นี้</div>
          </div>
          <div class="stat-card">
            <div class="label">รอรับสินค้า</div>
            <div class="value" id="dashIncomingOrders">3 ออเดอร์</div>
            <div class="delta">คาดถึงใน 2 วัน</div>
          </div>
        </div>

        <div class="row-2">
          <div class="panel">
            <div class="panel-head">
              <h3>ยอดขาย 7 วันล่าสุด</h3>
              <button class="link-btn" onclick="document.querySelector('[data-tab=reports]').click()">ดูรายงานเต็ม</button>
            </div>
            <div class="panel-body">
              <div class="bars">
                <div class="bar-col"><div class="bar" style="height:55%"></div><div class="bar-label">จ.</div></div>
                <div class="bar-col"><div class="bar" style="height:70%"></div><div class="bar-label">อ.</div></div>
                <div class="bar-col"><div class="bar" style="height:40%"></div><div class="bar-label">พ.</div></div>
                <div class="bar-col"><div class="bar" style="height:85%"></div><div class="bar-label">พฤ.</div></div>
                <div class="bar-col"><div class="bar" style="height:60%"></div><div class="bar-label">ศ.</div></div>
                <div class="bar-col"><div class="bar" style="height:95%"></div><div class="bar-label">ส.</div></div>
                <div class="bar-col"><div class="bar active" style="height:75%"></div><div class="bar-label">อา.</div></div>
              </div>
            </div>
          </div>

          <div class="panel">
            <div class="panel-head">
              <h3>สินค้าใกล้หมด</h3>
              <span class="badge-count">0</span>
            </div>
            <div class="panel-body" style="padding-top:6px;">
              <!-- Dynamic low stock list -->
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <h3>สินค้าขายดีสัปดาห์นี้</h3>
            <button class="link-btn" onclick="document.querySelector('[data-tab=reports]').click()">ดูทั้งหมด</button>
          </div>
          <div class="panel-body" style="padding-top:0;">
            <table>
              <thead><tr><th>สินค้า</th><th>หมวดหมู่</th><th>ขายแล้ว</th><th>คงเหลือ</th><th>สถานะ</th></tr></thead>
              <tbody>
                <tr><td>น้ำดื่มขวดเล็ก</td><td>เครื่องดื่ม</td><td>142</td><td>58</td><td><span class="tag ok dot">ปกติ</span></td></tr>
                <tr><td>บะหมี่กึ่งสำเร็จรูป</td><td>อาหารแห้ง</td><td>98</td><td>12</td><td><span class="tag low dot">ใกล้หมด</span></td></tr>
                <tr><td>ขนมปังแผ่น</td><td>เบเกอรี่</td><td>76</td><td>20</td><td><span class="tag ok dot">ปกติ</span></td></tr>
                <tr><td>ผงซักฟอกซอง</td><td>ของใช้</td><td>61</td><td>34</td><td><span class="tag ok dot">ปกติ</span></td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </section>

    <!-- ================= PRODUCT ================= -->
    <section class="tab-content" id="tab-product">
      <div class="page">
        <div class="page-head"><p>เพิ่ม แก้ไข และค้นหาสินค้าในร้าน</p></div>

        <div class="toolbar">
          <div class="search">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3-3"/></svg>
            <input type="text" id="productSearchInput" placeholder="ค้นหาสินค้า เช่น ไข่ไก่ นมถั่วเหลือง...">
          </div>
          <button class="btn primary" id="addProductBtn">+ เพิ่มสินค้าใหม่</button>
        </div>

        <div class="pill-row" id="productCategoryPills">
          <button class="pill active" data-category="ทั้งหมด">ทั้งหมด</button>
          <button class="pill" data-category="เครื่องดื่ม">เครื่องดื่ม</button>
          <button class="pill" data-category="อาหารสด">อาหารสด</button>
          <button class="pill" data-category="อาหารแห้ง">อาหารแห้ง</button>

  const sunPath = `<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>`;
  const moonPath = `<path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/>`;

  function updateDarkModeUI(isDark) {
    if (isDark) {
      document.body.classList.add('dark');
      darkModeIcon.innerHTML = sunPath;
    } else {
      document.body.classList.remove('dark');
      darkModeIcon.innerHTML = moonPath;
    }
  }

  let isDarkMode = localStorage.getItem('paedang_dark_mode') === 'true';
  updateDarkModeUI(isDarkMode);

  darkModeBtn.addEventListener('click', () => {
    isDarkMode = !isDarkMode;
    localStorage.setItem('paedang_dark_mode', isDarkMode);
    updateDarkModeUI(isDarkMode);
  });

  /* ---------- Rendering Functions ---------- */
  const productTableBody = document.getElementById('productTableBody');
  const productEmptyState = document.getElementById('productEmptyState');
  const productCategoryPills = document.getElementById('productCategoryPills');
  const productSearchInput = document.getElementById('productSearchInput');

  function renderProductTable(){
    productTableBody.innerHTML = '';
    products.forEach(p => {
      const statusTag = p.stock <= p.rop
        ? '<span class="tag low dot">ใกล้หมด</span>'
        : '<span class="tag ok dot">ปกติ</span>';

      const row = document.createElement('tr');
      row.dataset.id = p.id;
      row.innerHTML = `
        <td><strong>${p.name}</strong></td>
        <td>${p.category}</td>
        <td>${p.price} ฿${p.unit ? '/' + p.unit : ''}</td>
        <td>${p.stock}</td>
        <td>${statusTag}</td>
        <td><button class="link-btn edit-product-btn">แก้ไข</button></td>
      `;
      productTableBody.appendChild(row);
    });
    applyProductFilters();
    refreshSaleProductOptions();
    renderRecommendationTable();
    updateDashboardStats();
  }

  function applyProductFilters(){
    const q = productSearchInput.value.trim().toLowerCase();
    const activeCategory = productCategoryPills.querySelector('.pill.active').dataset.category;
    let visibleCount = 0;
    Array.from(productTableBody.rows).forEach(row => {
      const name = row.cells[0].textContent.toLowerCase();
      const category = row.cells[1].textContent;
      const matchesSearch = !q || name.includes(q);
      const matchesCategory = activeCategory === 'ทั้งหมด' || category === activeCategory;
      const visible = matchesSearch && matchesCategory;
      row.style.display = visible ? '' : 'none';
      if (visible) visibleCount++;
    });
    productEmptyState.style.display = visibleCount === 0 ? 'block' : 'none';
  }

  productSearchInput.addEventListener('input', applyProductFilters);
  productCategoryPills.querySelectorAll('.pill').forEach(p => {
    p.addEventListener('click', () => {
      setTimeout(applyProductFilters, 50); // wait for active class toggle
    });
  });

  /* ---------- Dashboard Stats Management ---------- */
  function updateDashboardStats(){
    document.getElementById('dashTotalSales').textContent = totalSales.toLocaleString('th-TH') + ' ฿';
    document.getElementById('dashTotalItems').textContent = products.length + ' รายการ';

    const lowStockCount = products.filter(p => p.stock <= p.rop).length;
    document.getElementById('dashLowStockItems').textContent = lowStockCount + ' รายการ';
    document.querySelector('.badge-count').textContent = lowStockCount;

    // Render low stock list on Dashboard
    const lowStockListPanel = document.querySelector('#tab-dashboard .badge-count').closest('.panel').querySelector('.panel-body');
    let lowStockHtml = '';
    const lowStockItems = products.filter(p => p.stock <= p.rop);
    if (lowStockItems.length === 0) {
      lowStockHtml = '<p style="font-size:13px; color:var(--ink-soft); padding:10px 0; text-align:center;">ไม่มีสินค้าใกล้หมด</p>';
    } else {
      lowStockItems.forEach(p => {
        lowStockHtml += `
          <div class="rec-row">
            <div>
              <div class="rec-name">${p.name}</div>
              <div class="rec-sub">เหลือ ${p.stock} ${p.unit || 'ชิ้น'}</div>
            </div>
            <span class="tag low dot">ใกล้หมด</span>
          </div>
        `;
      });
    }
    lowStockListPanel.innerHTML = lowStockHtml;
  }

  /* ---------- Recommendations List Management ---------- */
  const recoTableBody = document.getElementById('recoTableBody');
  const recoEmptyState = document.getElementById('recoEmptyState');
  const recoCheckAll = document.getElementById('recoCheckAll');

  function renderRecommendationTable(){
    recoTableBody.innerHTML = '';
    const lowStockItems = products.filter(p => p.stock <= p.rop);

    lowStockItems.forEach(p => {
      const row = document.createElement('tr');
      row.className = 'reco-row';
      row.dataset.id = p.id;
      row.dataset.product = p.name;
      row.dataset.qty = p.reorderQty;
      row.dataset.unit = p.unit || 'ชิ้น';
      row.dataset.cost = p.cost;

      row.innerHTML = `
        <td><input type="checkbox" class="reco-check" checked></td>
        <td><strong>${p.name}</strong></td>
        <td>${p.stock}</td>
        <td>${p.salesPerDay}</td>
        <td>${p.rop}</td>
        <td class="rec-qty"><span class="n" style="font-size:14px;">${p.reorderQty}</span> <span class="u">${p.unit || 'ชิ้น'}</span></td>
      `;
      recoTableBody.appendChild(row);
    });

    recoTableBody.querySelectorAll('.reco-check').forEach(cb => {
      cb.addEventListener('change', () => {
        const allCbs = Array.from(recoTableBody.querySelectorAll('.reco-check'));
        recoCheckAll.checked = allCbs.every(c => c.checked);
      });
    });

    checkRecoEmpty();
  }

  recoCheckAll.addEventListener('change', () => {
    recoTableBody.querySelectorAll('.reco-check').forEach(cb => cb.checked = recoCheckAll.checked);
  });

  function checkRecoEmpty(){
    const hasItems = recoTableBody.rows.length > 0;
    recoEmptyState.style.display = hasItems ? 'none' : 'block';
    document.getElementById('recoTable').style.display = hasItems ? 'table' : 'none';
  }

  /* ---------- Purchase Order Modal & LINE Sharing ---------- */
  const poModal = document.getElementById('poModal');
  const poItemsBody = document.getElementById('poItemsBody');
  const poTotalCost = document.getElementById('poTotalCost');
  const poDate = document.getElementById('poDate');
  let selectedPoItems = [];

  document.getElementById('orderSelectedBtn').addEventListener('click', () => {
    const checkedRows = Array.from(recoTableBody.querySelectorAll('.reco-row'))
      .filter(row => row.querySelector('.reco-check').checked);

    if (checkedRows.length === 0){
      showToast('กรุณาเลือกสินค้าที่ต้องการสั่งซื้ออย่างน้อย 1 รายการ');
      return;
    }

    selectedPoItems = checkedRows.map(r => {
      const prodId = r.dataset.id;
      const product = products.find(p => p.id === prodId);
      return {
        id: prodId,
        name: r.dataset.product,
        qty: parseInt(r.dataset.qty, 10),
        unit: r.dataset.unit,
        cost: product ? product.cost : parseFloat(r.dataset.cost)
      };
    });

    // Populate PO Modal
    poItemsBody.innerHTML = '';
    let totalSumCost = 0;
    selectedPoItems.forEach(item => {
      const sumCost = item.qty * item.cost;
      totalSumCost += sumCost;
      const row = document.createElement('tr');
      row.innerHTML = `
        <td style="padding: 8px 10px; border-bottom:1px solid var(--line-soft);"><strong>${item.name}</strong></td>
        <td style="text-align: right; padding: 8px 10px; border-bottom:1px solid var(--line-soft);">${item.qty} ${item.unit}</td>
        <td style="text-align: right; padding: 8px 10px; border-bottom:1px solid var(--line-soft);">${sumCost.toLocaleString('th-TH')} ฿</td>
      `;
      poItemsBody.appendChild(row);
    });

    poTotalCost.textContent = totalSumCost.toLocaleString('th-TH') + ' ฿';
    poDate.textContent = 'วันที่สั่งซื้อ: ' + dateStr;
    poModal.classList.remove('hidden');
  });

  function closePoModalFunc() { poModal.classList.add('hidden'); }
  document.getElementById('closePoModal').addEventListener('click', closePoModalFunc);
  document.getElementById('cancelPoBtn').addEventListener('click', closePoModalFunc);
  poModal.addEventListener('click', (e) => { if (e.target === poModal) closePoModalFunc(); });

  // LINE Sharing PO formatting
  document.getElementById('copyLineBtn').addEventListener('click', () => {
    let text = `📝 ใบสั่งซื้อสินค้า - ร้านป้าแดง\n`;
    text += `วันที่สั่งซื้อ: ${dateStr}\n`;
    text += `----------------------------------\n`;
    selectedPoItems.forEach((item, idx) => {
      text += `${idx + 1}. ${item.name} x ${item.qty} ${item.unit}\n`;
    });
    text += `----------------------------------\n`;
    const totalCostStr = poTotalCost.textContent;
    text += `ยอดประมาณการทุนรวม: ${totalCostStr}`;

    navigator.clipboard.writeText(text).then(() => {
      showToast('คัดลอกข้อความสำหรับส่ง LINE เรียบร้อยแล้ว!');
    }).catch(err => {
      console.error('Failed to copy text: ', err);
      alert('ไม่สามารถคัดลอกข้อความอัตโนมัติได้:\n\n' + text);
    });
  });

  // Confirm Purchase & Replenish Stock
  document.getElementById('confirmPoBtn').addEventListener('click', () => {
    selectedPoItems.forEach(item => {
      const prod = products.find(p => p.id === item.id);
      if (prod) {
        prod.stock += item.qty;
      }
    });

    localStorage.setItem('paedang_products', JSON.stringify(products));
    renderProductTable();
    closePoModalFunc();
    showToast('สั่งซื้อสำเร็จ! เติมสินค้าเข้าสต็อกเรียบร้อยแล้ว');
  });

  /* ---------- Sales Record Tab Logic ---------- */
  const saleProductSelect = document.getElementById('saleProductSelect');
  const salePriceInput = document.getElementById('salePriceInput');
  const saleQtyInput = document.getElementById('saleQtyInput');
  const saleFormMsg = document.getElementById('saleFormMsg');
  const statBillCount = document.getElementById('statBillCount');
  const statTotalSales = document.getElementById('statTotalSales');
  const statProfitEst = document.getElementById('statProfitEst');
  const salesHistoryBody = document.getElementById('salesHistoryBody');

  function refreshSaleProductOptions(){
    const current = saleProductSelect.value;
    saleProductSelect.innerHTML = '<option value="">-- เลือกสินค้า --</option>';
    products.forEach(p => {
      const opt = document.createElement('option');
      opt.value = p.name;
      opt.dataset.price = p.price;
      opt.dataset.id = p.id;
      opt.textContent = `${p.name} (คงเหลือ: ${p.stock} ${p.unit})`;
      saleProductSelect.appendChild(opt);
    });
    if (Array.from(saleProductSelect.options).some(o => o.value === current)) saleProductSelect.value = current;
  }

  saleProductSelect.addEventListener('change', () => {
    const opt = saleProductSelect.selectedOptions[0];
    salePriceInput.value = opt && opt.dataset.price ? opt.dataset.price : '';
  });

  function renderSalesHistory(){
    salesHistoryBody.innerHTML = '';
    salesHistory.forEach(s => {
      const row = document.createElement('tr');
      row.innerHTML = `<td>${s.time}</td><td><strong>${s.productName}</strong></td><td>${s.qty}</td><td>${s.total.toLocaleString('th-TH')} ฿</td>`;
      salesHistoryBody.appendChild(row);
    });
  }

  function updateSalesSummaryUI(){
    statBillCount.textContent = billCount;
    statTotalSales.textContent = totalSales.toLocaleString('th-TH') + ' ฿';
    statProfitEst.textContent = Math.round(profitEst).toLocaleString('th-TH') + ' ฿';
  }

  document.getElementById('recordSaleBtn').addEventListener('click', () => {
    const productName = saleProductSelect.value;
    const qty = parseInt(saleQtyInput.value, 10);
    const price = parseFloat(salePriceInput.value);

    if (!productName || isNaN(qty) || qty <= 0 || isNaN(price) || price <= 0){
      saleFormMsg.textContent = 'เลือกสินค้า และกรอกจำนวน/ราคาให้ถูกต้องก่อนบันทึก';
      saleFormMsg.style.display = 'block';
      return;
    }

    const product = products.find(p => p.name === productName);
    if (!product) {
      saleFormMsg.textContent = 'ไม่พบสินค้าในระบบ';
      saleFormMsg.style.display = 'block';
      return;
    }

    if (product.stock < qty) {
      if (!confirm(`ยอดสต็อกคงเหลือไม่พอ (มีเพียง ${product.stock} ${product.unit}) ยืนยันที่จะบันทึกยอดขายสินค้าชิ้นนี้ใช่หรือไม่?`)) {
        return;
      }
    }

    saleFormMsg.style.display = 'none';

    if (!confirm('ยืนยันบันทึกการขาย "' + productName + '" จำนวน ' + qty + ' รายการใช่หรือไม่?')) return;

    const total = qty * price;
    const cost = product.cost || (price * 0.75);
    const profit = total - (qty * cost);

    const now = new Date();
    const timeStr = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');

    // Add to History
    const newSale = {
      time: timeStr,
      productName: productName,
      qty: qty,
      price: price,
      cost: cost,
      total: total,
      profit: profit
    };

    salesHistory.unshift(newSale);
    if (salesHistory.length > 50) salesHistory.pop();
    localStorage.setItem('paedang_sales', JSON.stringify(salesHistory));

    // Deduct stock
    product.stock = Math.max(0, product.stock - qty);
    localStorage.setItem('paedang_products', JSON.stringify(products));

    // Update variables & localStorage
    billCount += 1;
    totalSales += total;
    profitEst += profit;
    localStorage.setItem('paedang_bill_count', billCount);
    localStorage.setItem('paedang_total_sales', totalSales);
    localStorage.setItem('paedang_profit_est', profitEst);

    // Re-render
    renderProductTable();
    renderSalesHistory();
    updateSalesSummaryUI();

    saleQtyInput.value = 1;
    showToast('บันทึกการขาย ' + productName + ' จำนวน ' + qty + ' เรียบร้อยแล้ว');
  });

  /* ---------- Add Product Logic ---------- */
  const addProductModal = document.getElementById('addProductModal');
  const addProductMsg = document.getElementById('addProductMsg');

  function openAddProductModal(){
    addProductModal.classList.remove('hidden');
    addProductMsg.style.display = 'none';
    document.getElementById('newProductName').value = '';
    document.getElementById('newProductPrice').value = '';
    document.getElementById('newProductCost').value = '';
    document.getElementById('newProductStock').value = '';
    document.getElementById('newProductUnit').value = 'ชิ้น';
    document.getElementById('newProductCategory').selectedIndex = 0;
  }
  function closeAddProductModal(){ addProductModal.classList.add('hidden'); }

  document.getElementById('addProductBtn').addEventListener('click', openAddProductModal);
  document.getElementById('closeAddProductModal').addEventListener('click', closeAddProductModal);
  document.getElementById('cancelAddProduct').addEventListener('click', closeAddProductModal);
  addProductModal.addEventListener('click', (e)=>{ if (e.target === addProductModal) closeAddProductModal(); });

  document.getElementById('confirmAddProduct').addEventListener('click', () => {
    const name = document.getElementById('newProductName').value.trim();
    const category = document.getElementById('newProductCategory').value;
    const price = parseFloat(document.getElementById('newProductPrice').value);
    const cost = parseFloat(document.getElementById('newProductCost').value) || (price * 0.75);
    const stock = parseInt(document.getElementById('newProductStock').value, 10);
    const unit = document.getElementById('newProductUnit').value.trim() || 'ชิ้น';

    if (!name || isNaN(price) || price <= 0 || isNaN(stock) || stock < 0 || isNaN(cost) || cost < 0){
      addProductMsg.textContent = 'กรอกชื่อสินค้า ราคาทุน ราคาขาย และจำนวนคงเหลือให้ครบและถูกต้อง';
      addProductMsg.style.display = 'block';
      return;
    }

    if (!confirm('ยืนยันเพิ่มสินค้า "' + name + '" ใช่หรือไม่?')) return;

    const newProd = {
      id: 'p_' + Date.now(),
      name,
      category,
      price,
      cost,
      stock,
      unit,
      salesPerDay: 1.0,
      rop: 5,
      reorderQty: 12
    };

    products.push(newProd);
    localStorage.setItem('paedang_products', JSON.stringify(products));

    renderProductTable();
    closeAddProductModal();
    showToast('เพิ่มสินค้า "' + name + '" เรียบร้อยแล้ว');
  });

  /* ---------- Edit/Delete Product Logic ---------- */
  const editProductModal = document.getElementById('editProductModal');
  const editProductMsg = document.getElementById('editProductMsg');
  let editingProduct = null;

  function openEditProductModal(row){
    const prodId = row.dataset.id;
    editingProduct = products.find(p => p.id === prodId);
    if (!editingProduct) return;

    editProductMsg.style.display = 'none';

    document.getElementById('editProductName').value = editingProduct.name;
    document.getElementById('editProductCategory').value = editingProduct.category;
    document.getElementById('editProductPrice').value = editingProduct.price;
    document.getElementById('editProductCost').value = editingProduct.cost || '';
    document.getElementById('editProductStock').value = editingProduct.stock;
    document.getElementById('editProductUnit').value = editingProduct.unit || 'ชิ้น';

    editProductModal.classList.remove('hidden');
  }

  function closeEditProductModal(){ editProductModal.classList.add('hidden'); editingProduct = null; }

  productTableBody.addEventListener('click', (e)=>{
    const btn = e.target.closest('.edit-product-btn');
    if (!btn) return;
    openEditProductModal(btn.closest('tr'));
  });

  document.getElementById('closeEditProductModal').addEventListener('click', closeEditProductModal);
  document.getElementById('cancelEditProduct').addEventListener('click', closeEditProductModal);
  editProductModal.addEventListener('click', (e)=>{ if (e.target === editProductModal) closeEditProductModal(); });

  document.getElementById('confirmEditProduct').addEventListener('click', () => {
    if (!editingProduct) return;
    const name = document.getElementById('editProductName').value.trim();
    const category = document.getElementById('editProductCategory').value;
    const price = parseFloat(document.getElementById('editProductPrice').value);
    const cost = parseFloat(document.getElementById('editProductCost').value) || (price * 0.75);
    const stock = parseInt(document.getElementById('editProductStock').value, 10);
    const unit = document.getElementById('editProductUnit').value.trim() || 'ชิ้น';

    if (!name || isNaN(price) || price <= 0 || isNaN(stock) || stock < 0 || isNaN(cost) || cost < 0){
      editProductMsg.textContent = 'กรอกชื่อสินค้า ราคาทุน ราคาขาย และจำนวนคงเหลือให้ครบและถูกต้อง';
      editProductMsg.style.display = 'block';
      return;
    }

    if (!confirm('ยืนยันบันทึกการแก้ไขสินค้า "' + name + '" ใช่หรือไม่?')) return;

    editingProduct.name = name;
    editingProduct.category = category;
    editingProduct.price = price;
    editingProduct.cost = cost;
    editingProduct.stock = stock;
    editingProduct.unit = unit;

    localStorage.setItem('paedang_products', JSON.stringify(products));

    renderProductTable();
    closeEditProductModal();
    showToast('บันทึกการแก้ไข "' + name + '" เรียบร้อยแล้ว');
  });

  document.getElementById('deleteProductBtn').addEventListener('click', () => {
    if (!editingProduct) return;
    const name = editingProduct.name;
    if (confirm('ต้องการลบสินค้า "' + name + '" ใช่หรือไม่? (ไม่สามารถย้อนกลับได้)')){
      products = products.filter(p => p.id !== editingProduct.id);
      localStorage.setItem('paedang_products', JSON.stringify(products));

      renderProductTable();
      closeEditProductModal();
      showToast('ลบสินค้า "' + name + '" แล้ว');
    }
  });

  /* ---------- Reports: Sales Trend Chart ---------- */
  const salesTrendLabels = ['จ.','อ.','พ.','พฤ.','ศ.','ส.','อา.'];
  const salesTrendData = [980, 1310, 760, 1740, 1200, 2010, 1520];

  if (typeof Chart === 'undefined'){
    document.getElementById('salesTrendChart').closest('.panel-body').innerHTML =
      '<p style="font-size:12.5px; color:var(--danger);">โหลดไลบรารีกราฟ (Chart.js) ไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วรีเฟรชหน้านี้</p>';
  } else {
    new Chart(document.getElementById('salesTrendChart'), {
      type: 'bar',
      data: {
        labels: salesTrendLabels,
        datasets: [{
          label: 'ยอดขาย (฿)',
          data: salesTrendData,
          backgroundColor: '#E7F3EB',
          hoverBackgroundColor: '#1F7A4D',
          borderRadius: 4,
          maxBarThickness: 40
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          y: { beginAtZero: true, ticks: { callback: v => v.toLocaleString('th-TH') + ' ฿' } }
        }
      }
    });
  }

  /* ---------- Reports: Export Excel ---------- */
  document.getElementById('exportExcelBtn').addEventListener('click', ()=>{
    if (typeof XLSX === 'undefined'){
      alert('โหลดไลบรารี Excel ไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่');
      return;
    }
    if (!confirm('ยืนยันดาวน์โหลดรายงานเป็นไฟล์ Excel ใช่หรือไม่?')) return;

    const wb = XLSX.utils.book_new();

    const trendData = [['วัน','ยอดขาย (บาท)']];
    salesTrendLabels.forEach((label, i)=> trendData.push([label, salesTrendData[i]]));
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(trendData), 'แนวโน้มยอดขาย');

    const bestRows = [['สินค้า','ขายแล้ว']];
    document.querySelectorAll('#bestSellerTable tbody tr').forEach(row=>{
      bestRows.push([row.cells[0].textContent, row.cells[1].textContent]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(bestRows), 'สินค้าขายดี');

    const slowRows = [['สินค้า','ขายแล้ว']];
    document.querySelectorAll('#slowSellerTable tbody tr').forEach(row=>{
      slowRows.push([row.cells[0].textContent, row.cells[1].textContent]);
    });
    XLSX.utils.book_append_sheet(wb, XLSX.utils.aoa_to_sheet(slowRows), 'สินค้าขายช้า');

    XLSX.writeFile(wb, 'รายงานยอดขาย-ร้านป้าแดง.xlsx');
    showToast('กำลังดาวน์โหลดไฟล์ Excel...');
  });

  /* ---------- Reports: Export PDF with Dynamic Thai Font Support ---------- */
  document.getElementById('exportPdfBtn').addEventListener('click', async () => {
    if (typeof window.jspdf === 'undefined'){
      alert('โหลดไลบรารี PDF ไม่สำเร็จ กรุณาตรวจสอบการเชื่อมต่ออินเทอร์เน็ตแล้วลองใหม่');
      return;
    }
    if (!confirm('ยืนยันดาวน์โหลดรายงานสรุปยอดขายภาษาไทย (PDF) ใช่หรือไม่?')) return;

    showToast('กำลังดาวน์โหลดฟอนต์ภาษาไทยและเตรียม PDF...');

    try {
      // Fetch a beautiful free Thai font (Sarabun) from Google Fonts CDN
      const fontUrl = 'https://cdn.jsdelivr.net/gh/googlefonts/sarabun@master/fonts/ttf/Sarabun-Regular.ttf';
      const response = await fetch(fontUrl);
      if (!response.ok) throw new Error('Failed to fetch font.');
      const arrayBuffer = await response.arrayBuffer();

      // Convert to Base64
      let binary = '';
      const bytes = new Uint8Array(arrayBuffer);
      const len = bytes.byteLength;
      for (let i = 0; i < len; i++) {
        binary += String.fromCharCode(bytes[i]);
      }
      const base64Font = window.btoa(binary);

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();

      // Register font in jsPDF VFS
      doc.addFileToVFS('Sarabun-Regular.ttf', base64Font);
      doc.addFont('Sarabun-Regular.ttf', 'Sarabun', 'normal');
      doc.setFont('Sarabun');

      // Add report header
      doc.setFontSize(18);
      doc.text('รายงานสรุปการขายและคลังสินค้า - ร้านป้าแดง', 14, 18);
      
      doc.setFontSize(10);
      doc.text('วันที่รายงาน: ' + dateStr, 14, 25);

      // Section 1: Sales Trend
      doc.setFontSize(13);
      doc.text('1. ยอดขายรายวัน (7 วันล่าสุด)', 14, 35);

      const trendRows = salesTrendLabels.map((l, i) => [l, salesTrendData[i].toLocaleString('th-TH') + ' ฿']);
      doc.autoTable({
        startY: 39,
        head: [['วัน', 'ยอดขาย']],
        body: trendRows,
        styles: { font: 'Sarabun', fontSize: 10 },
        headStyles: { fillColor: [31, 122, 77] }
      });

      // Section 2: Best Sellers
      let nextY = doc.lastAutoTable.finalY + 12;
      doc.setFontSize(13);
      doc.text('2. รายการสินค้าขายดี', 14, nextY);

      const bestRows = Array.from(document.querySelectorAll('#bestSellerTable tbody tr'))
        .map(row => [row.cells[0].textContent, row.cells[1].textContent]);
      doc.autoTable({
        startY: nextY + 4,
        head: [['สินค้า', 'จำนวนที่ขายแล้ว']],
        body: bestRows,
        styles: { font: 'Sarabun', fontSize: 10 },
        headStyles: { fillColor: [31, 122, 77] }
      });

      // Section 3: Slow Sellers
      nextY = doc.lastAutoTable.finalY + 12;
      doc.setFontSize(13);
      doc.text('3. รายการสินค้าขายช้า (ควรพิจารณาปรับสต็อก)', 14, nextY);

      const slowRows = Array.from(document.querySelectorAll('#slowSellerTable tbody tr'))
        .map(row => [row.cells[0].textContent, row.cells[1].textContent]);
      doc.autoTable({
        startY: nextY + 4,
        head: [['สินค้า', 'จำนวนที่ขายได้']],
        body: slowRows,
        styles: { font: 'Sarabun', fontSize: 10 },
        headStyles: { fillColor: [179, 56, 44] }
      });

      doc.save('รายงานยอดขายและสต็อก-ร้านป้าแดง.pdf');
      showToast('ดาวน์โหลดไฟล์ PDF เรียบร้อยแล้ว');
    } catch (err) {
      console.error('PDF customization error: ', err);
      alert('ไม่สามารถโหลดฟอนต์ภาษาไทยได้เนื่องจากเครือข่ายขัดข้อง จะนำส่งรายงานเป็นรูปแบบมาตรฐานภาษาอังกฤษ');

      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      doc.setFontSize(16);
      doc.text('Sales & Inventory Report - PaeDang Shop', 14, 18);
      doc.setFontSize(11);
      doc.text('Sales trend (last 7 days)', 14, 30);
      doc.autoTable({
        startY: 34,
        head: [['Day', 'Sales']],
        body: salesTrendLabels.map((l,i)=>[l, salesTrendData[i].toLocaleString('en-US') + ' THB'])
      });
      doc.save('sales-report-fallback.pdf');
    }
  });

  /* ---------- Initial Render Call ---------- */
  renderProductTable();
  renderSalesHistory();
  updateSalesSummaryUI();

  /* ---------- Logout ---------- */
  document.getElementById('logoutBtn').addEventListener('click', ()=>{
    if (confirm('ต้องการออกจากระบบใช่หรือไม่?')){
      window.location.href = 'index.html';
    }
  });
</script>
</body>
</html>
